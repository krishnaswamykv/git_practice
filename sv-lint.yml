name: SV Lint Test

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Custom Action
        id: lint
        uses: krishnaswamykv/sv-lint-action@v1
        with:
          sv_files: "rtl/test.sv"
          severity: warning
